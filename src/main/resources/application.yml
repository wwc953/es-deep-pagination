server:
  port: 18080

spring:
  application:
    name: es-deep-pagination

  elasticsearch:
    uris: localhost:9200
    username:
    password:
    connection-timeout: 10s
    socket-timeout: 30s

# 深度分页配置
deep-pagination:
  # 默认最大分页大小
  max-page-size: 100
  # Scroll上下文保持时间
  scroll-keep-alive-minutes: 5
  # Search After PIT保持时间
  pit-keep-alive-minutes: 2
  # 向量维度
  vector-dimensions: 768
  # KNN搜索的k值
  knn-k: 10
  # KNN候选数量
  knn-num-candidates: 100
  # RRF窗口大小
  rrf-window-size: 50
  # RRF排名常数
  rrf-rank-constant: 60

logging:
  level:
    root: INFO
    org.elasticsearch.client: DEBUG
